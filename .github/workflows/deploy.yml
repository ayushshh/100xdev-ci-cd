name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 13.233.127.12
          username: ubuntu
          key: ${{ secrets.PRIVATE_SSH_KEY }}
          passphrase: ${{ secrets.PRIVATE_SSH_KEY_PASSPHRASE }}
          port: 22
          script: | 
            # Load NVM so npm and pm2 are available in the SSH session
            export NVM_DIR=~/.nvm
            source ~/.nvm/nvm.sh
            
            cd 100xdev-ci-cd/
            git pull origin main
            npm install 
            npm run build 
            
            # Restart the PM2 process if it exists, otherwise start a new one
            pm2 restart next-app || pm2 start npm --name "next-app" -- start