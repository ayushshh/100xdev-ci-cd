name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 13.233.127.12
          username: ubuntu
          key: ${{ secrets.PRIVATE_SSH_KEY }}
          passphrase: ${{ secrets.PRIVATE_SSH_KEY_PASSPHRASE }} # only if you set one
          port: 22
          script: | 
            whoami
            ls